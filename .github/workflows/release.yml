name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check tag and project versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exit(1);
          };

          const cargoVersion = (path) => {
            const text = fs.readFileSync(path, "utf8");
            const packageBlock = text.match(/\[package\]([\s\S]*?)(?=\r?\n\[|$)/)?.[1];
            return packageBlock?.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          };

          const tag = process.env.GITHUB_REF_NAME;
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            fail(`Release tag "${tag}" must look like v1.2.3 or v1.2.3-beta.1.`);
          }

          const expected = tag.slice(1);
          const versions = {
            "Cargo.toml": cargoVersion("Cargo.toml"),
            "web/src-tauri/Cargo.toml": cargoVersion("web/src-tauri/Cargo.toml"),
            "web/src-tauri/tauri.conf.json": JSON.parse(
              fs.readFileSync("web/src-tauri/tauri.conf.json", "utf8")
            ).version,
          };

          for (const [path, version] of Object.entries(versions)) {
            if (version !== expected) {
              fail(`${path} has version "${version}", but the tag is "${tag}".`);
            }
          }

          console.log(`All project versions match ${tag}.`);
          NODE

  build-release:
    name: Build ${{ matrix.label }}
    needs: validate-version
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            apple_signing_identity: "-"
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            apple_signing_identity: "-"
          - label: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            apple_signing_identity: ""
          - label: Windows x64
            platform: windows-latest
            args: ""
            rust_targets: ""
            apple_signing_identity: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust 1.97
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./web/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Restore Gmail OAuth build configuration
        shell: pwsh
        env:
          GOOGLE_OAUTH_CLIENT_JSON_BASE64: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_OAUTH_CLIENT_JSON_BASE64)) {
            throw "Repository secret GOOGLE_OAUTH_CLIENT_JSON_BASE64 is required for a release build."
          }
          $bytes = [Convert]::FromBase64String($env:GOOGLE_OAUTH_CLIENT_JSON_BASE64)
          $path = Join-Path $env:GITHUB_WORKSPACE "web/src-tauri/google-oauth-client.json"
          [IO.File]::WriteAllBytes($path, $bytes)

      - name: Build installers and publish GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
        with:
          projectPath: web
          tagName: ${{ github.ref_name }}
          releaseName: Mine Mail ${{ github.ref_name }}
          releaseBody: "Mine Mail desktop installers. Choose the file for your operating system."
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish complete release
    needs: build-release
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
